<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
</head>

<body>
    <h1>Signup</h1>
    <input
        id="username"
        placeholder="Username"
    >
    <br><br>
    <input
        id="password"
        type="password"
        placeholder="Password"
    >
    <br><br>
    <select id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
    </select>
       <br><br>
    <button id="btn">
        Signup
    </button>

    <script src="signup.js"></script>

</body>

</html>
